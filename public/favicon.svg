  <circle cx="100" cy="100" r="52" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.7" style="fill:none;stroke:rgb(56, 189, 248);color:rgb(251, 251, 254);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="100" cy="100" r="52" fill="none" stroke="#38bdf8" stroke-width="3" opacity="0.15" filter="url(#softBlur)" style="fill:none;stroke:rgb(56, 189, 248);color:rgb(251, 251, 254);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

